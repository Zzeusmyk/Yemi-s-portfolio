<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Thank you — Yemi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ambient background -->
  <div class="grain" aria-hidden="true"></div>
  <div class="orb orb-1" aria-hidden="true"></div>
  <div class="orb orb-2" aria-hidden="true"></div>
  <div class="orb orb-3" aria-hidden="true"></div>

  <main class="thanks-wrap">
    <div class="contact-card thanks-card">
      <span class="thanks-check" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none"><path d="m5 13 4 4L19 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </span>
      <p class="eyebrow">Message received</p>
      <h2>Thank you<span class="serif">.</span></h2>
      <p class="contact-sub">
        Your message just landed in my inbox. I read every one personally and
        I'll get back to you within 48 hours. In the meantime — keep creating.
      </p>
      <div class="thanks-cta">
        <a href="index.html" class="glass-btn">
          <svg viewBox="0 0 24 24" fill="none"><path d="M19 12H5M11 18l-6-6 6-6" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>Back to home</span>
        </a>
        <a href="index.html#work" class="glass-btn glass-btn--ghost">
          <span>See my work</span>
        </a>
      </div>
      <p class="thanks-note">Taking you back home in <span id="count">10</span>s…</p>
    </div>
  </main>

  <script>
    (function () {
      var n = 10;
      var el = document.getElementById("count");
      var prefersReduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      var t = setInterval(function () {
        n -= 1;
        if (el) el.textContent = n;
        if (n <= 0) { clearInterval(t); window.location.href = "index.html"; }
      }, 1000);
      // cancel auto-redirect if the visitor interacts
      ["click", "keydown", "touchstart"].forEach(function (ev) {
        document.addEventListener(ev, function () {
          clearInterval(t);
          var note = document.querySelector(".thanks-note");
          if (note) note.style.display = "none";
        }, { once: true });
      });
    })();
  </script>
</body>
</html>
